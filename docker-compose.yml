services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  gameserver:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MATCH_TURN_TIMEOUT_MS: ${MATCH_TURN_TIMEOUT_MS:-30000}
      MAX_TURNS: ${MAX_TURNS:-50}
    # Port is not exposed to the host — ngrok handles public access.
    # Uncomment the line below if you want direct localhost access too.
    # ports:
    #   - "3000:3000"

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      - gameserver
    command: http gameserver:3000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040" # ngrok web inspector UI

volumes:
  redis_data:
